<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard • Incredible India Tours</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="bg">
  <header class="topbar">
    <div class="brand">
      <a href="home.html" class="logo" aria-label="Home">🪷</a>
      <div>
        <strong>Incredible India Tours</strong>
        <div class="muted small">Admin Dashboard</div>
      </div>
    </div>
    <nav class="nav">
      <button class="btn ghost" id="exportCsv">Export CSV</button>
      <button class="btn warn" id="seedBtn">Seed Sample</button>
      <button class="btn danger" id="btnLogout">Logout</button>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <header class="panel-head row between wrap gap">
        <h2>Bookings</h2>
        <div class="row wrap gap">
          <input id="bkSearch" class="w-260" placeholder="Search name / email / destination" />
          <select id="bkState"></select>
          <select id="bkStatus">
            <option value="All">All Statuses</option>
            <option value="PAID">PAID</option>
            <option value="PENDING">PENDING</option>
          </select>
        </div>
      </header>
      <div class="panel-body overflow">
        <table class="table">
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Destination</th>
              <th>Days</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Booked At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bkTbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">© <span id="yr"></span> Incredible India Tours • Demo</footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
