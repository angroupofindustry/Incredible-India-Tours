<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login • Incredible India Tours</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="bg">
  <main class="container auth-grid">
    <section class="panel hero">
      <div class="hero-bg city"></div>
      <div class="hero-body">
        <div class="brand">
          <div class="logo" aria-hidden="true">🛡️</div>
          <div>
            <h1>Admin Access</h1>
            <p class="muted">Manage bookings, export data, update statuses.</p>
          </div>
        </div>
      </div>
    </section>
    <section class="panel card">
      <header class="card-head">
        <h2>Admin Login</h2>
        <span class="muted">Demo: <code>admin@iitours.in</code> / <code>admin123</code></span>
      </header>
      <div class="card-body">
        <form id="adminLoginForm" class="form-grid">
          <label>
            <span>Email</span>
            <input id="a_email" type="email" placeholder="admin@iitours.in" required />
          </label>
          <label>
            <span>Password</span>
            <input id="a_pass" type="password" placeholder="••••••••" required />
          </label>
          <div class="row end gap">
            <a class="btn ghost" href="index.html">Back</a>
            <button class="btn" type="submit">Login</button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <footer class="footer">© <span id="yr"></span> Incredible India Tours • Demo</footer>
  <script src="assets/js/utils.js"></script>
  <script>
    byId('yr').textContent = new Date().getFullYear();
    on('#adminLoginForm','submit',(e)=>{
      e.preventDefault();
      const ok = val('a_email')==='admin@iitours.in' && val('a_pass')==='admin123';
      if(!ok){ toast('Invalid credentials'); return; }
      storage.patch({ admin: { email: val('a_email') } });
      go('admin-dashboard.html');
    });
  </script>
</body>
</html>
